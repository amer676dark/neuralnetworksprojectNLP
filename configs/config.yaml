project:
  name: "Arabic ASR System"
  description: "Deep Learning Based Arabic Audio Understanding and Retrieval System"
  language: "ar"

data:
  # Source: "common_voice" | "masc" | "arabic_speech_corpus" | "kaggle_arabic_tts" | "ejust" | "combined"
  source: "kaggle_arabic_tts"
  # For local datasets (kaggle_arabic_tts, arabic_speech_corpus, ejust) — set the folder path
  data_dir: "./data/arabic_tts"
  # HuggingFace token — required for SeamlessM4T (or set HF_TOKEN env var)
  hf_token: null
  combine_sources: ["kaggle_arabic_tts", "arabic_speech_corpus", "masc"]

  sample_rate: 16000
  max_duration: 10           # seconds — clips longer than this are pad/trimmed
  max_train_samples: 40000   # 40k yields ~30-40% WER on the new architecture
  max_eval_samples: 1000
  processed_dir: "./data/processed"

audio:
  sample_rate: 16000
  n_mels: 80
  n_fft: 512
  hop_length: 160            # 10 ms hop @ 16kHz
  win_length: 400            # 25 ms window
  f_min: 0
  f_max: 8000
  max_audio_length: 10

cnn_lstm:
  # CNN encoder: 4x time + 4x freq subsampling, then a residual block
  cnn_channels: [64, 128, 256]
  cnn_dropout: 0.1
  # BiLSTM — bumped to 768x4 (~55M total params) for more capacity
  lstm_hidden_size: 768
  lstm_num_layers: 4
  lstm_dropout: 0.15
  # Self-attention
  attention_heads: 8
  # SpecAugment in the subsampled domain (auto-scaled mask widths)
  spec_augment: true

  # Training
  batch_size: 96             # larger batches → better Blackwell tensor-core utilization
  learning_rate: 0.0005      # more conservative since CTC input_lengths now mask padding
  weight_decay: 0.00001
  num_epochs: 25             # 25 ep is plenty with the new architecture + EMA eval
  gradient_clip: 5.0
  warmup_pct: 0.1            # OneCycleLR warmup fraction
  checkpoint_dir: "./outputs/checkpoints/cnn_lstm"

  # Infra knobs
  num_workers: 24            # 32-core box — keep GPU fed
  amp: true                  # bf16 autocast on Blackwell tensor cores
  compile: true              # torch.compile (reduce-overhead) on first epoch
  ema_decay: 0.999           # EMA shadow weights used for validation + final eval
  seed: 1337                 # reproducibility
  return_mode: "waveform"    # dataset returns raw audio; model runs GPU mel
  log_every: 50              # print a step-loss snapshot every N batches

whisper:
  model_size: "medium"
  language: "ar"
  task: "transcribe"
  device: "auto"
  beam_size: 5

wav2vec:
  model_name: "facebook/wav2vec2-large-xlsr-53-arabic"
  device: "auto"
  batch_size: 8
  num_epochs: 10
  learning_rate: 1e-4
  warmup_ratio: 0.1
  checkpoint_dir: "./outputs/checkpoints/wav2vec"

seamless_m4t:
  model_name: "facebook/seamless-m4t-v2-large"  # use hf-seamless-m4t-medium if VRAM is tight
  language: "arb"     # ISO 639-3 — Standard Arabic
  device: "auto"

advanced:
  speaker_id:
    enabled: true
    model_name: "speechbrain/spkrec-ecapa-voxceleb"
    similarity_threshold: 0.7
  emotion:
    enabled: true
    model_name: "harshit345/xlsr-wav2vec-speech-emotion-recognition"
    classes: ["angry", "calm", "disgust", "fear", "happy", "neutral", "sad", "surprise"]
  keyword_spotting:
    enabled: true
    keywords: ["طوارئ", "موعد نهائي", "امتحان", "emergency", "deadline", "exam"]
  summarization:
    enabled: true
    model_name: "csebuetnlp/mT5_multilingual_XLSum"
    max_length: 80
    min_length: 20
  search:
    enabled: true
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    top_k: 5

evaluation:
  metrics: ["wer", "cer"]
  results_dir: "./outputs/results"
  log_dir: "./outputs/logs"
  num_test_samples: 300

demo:
  server_port: 7860
  share: false
