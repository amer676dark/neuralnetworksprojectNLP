project:
  name: "Arabic ASR System"
  description: "Deep Learning Based Arabic Audio Understanding and Retrieval System"
  language: "ar"

data:
  dataset_name: "mozilla-foundation/common_voice_17_0"
  language_code: "ar"
  sample_rate: 16000
  max_duration: 30  # seconds
  train_split: "train"
  validation_split: "validation"
  test_split: "test"
  data_dir: "./data/raw"
  processed_dir: "./data/processed"
  max_train_samples: 5000   # set null for full dataset
  max_eval_samples: 500

audio:
  sample_rate: 16000
  n_mels: 80
  n_fft: 512
  hop_length: 160
  win_length: 400
  f_min: 0
  f_max: 8000
  max_audio_length: 30  # seconds

cnn_lstm:
  # CNN encoder
  cnn_channels: [32, 64, 128]
  cnn_kernel_size: 3
  cnn_dropout: 0.2
  # LSTM decoder
  lstm_hidden_size: 512
  lstm_num_layers: 3
  lstm_dropout: 0.3
  bidirectional: true
  # Training
  batch_size: 16
  learning_rate: 0.0003
  num_epochs: 50
  warmup_steps: 1000
  gradient_clip: 5.0
  checkpoint_dir: "./outputs/checkpoints/cnn_lstm"

whisper:
  model_size: "medium"  # tiny, base, small, medium, large-v2, large-v3
  language: "ar"
  task: "transcribe"
  device: "auto"  # auto, cpu, cuda, mps

wav2vec:
  model_name: "facebook/wav2vec2-large-xlsr-53-arabic"
  device: "auto"
  batch_size: 8
  num_epochs: 10
  learning_rate: 1e-4
  warmup_ratio: 0.1
  checkpoint_dir: "./outputs/checkpoints/wav2vec"

evaluation:
  metrics: ["wer", "cer"]
  results_dir: "./outputs/results"
  log_dir: "./outputs/logs"

demo:
  server_name: "0.0.0.0"
  server_port: 7860
  share: false
  title: "Arabic Speech Recognition System"
