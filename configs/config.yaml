project:
  name: "Arabic ASR System"
  description: "Deep Learning Based Arabic Audio Understanding and Retrieval System"
  language: "ar"

data:
  # Source: "common_voice" | "masc" | "arabic_speech_corpus" | "kaggle_arabic_tts" | "ejust" | "combined"
  source: "kaggle_arabic_tts"
  # For local datasets (kaggle_arabic_tts, arabic_speech_corpus, ejust) — set the folder path
  data_dir: "./data/arabic_tts"
  # HuggingFace token — required for Common Voice / SeamlessM4T (or set HF_TOKEN env var)
  hf_token: null
  # Which sources to mix if source = "combined"
  combine_sources: ["kaggle_arabic_tts", "arabic_speech_corpus", "masc"]

  sample_rate: 16000
  max_duration: 10       # seconds — clips longer than this are skipped
  max_train_samples: 40000   # 40k for the scaled-up training run on RTX Pro 6000
  max_eval_samples: 1000
  processed_dir: "./data/processed"

audio:
  sample_rate: 16000
  n_mels: 80
  n_fft: 512
  hop_length: 160
  win_length: 400
  f_min: 0
  f_max: 8000
  max_audio_length: 10

cnn_lstm:
  # CNN — larger first block on a 96GB GPU
  cnn_channels: [64, 128, 256]
  cnn_kernel_size: 3
  cnn_dropout: 0.15
  # BiLSTM — beefier hidden + extra layer (96GB VRAM allows this comfortably)
  lstm_hidden_size: 1024
  lstm_num_layers: 5
  lstm_dropout: 0.3
  # Attention
  attention_heads: 8
  # SpecAugment
  spec_augment: true
  # Training
  batch_size: 64           # RTX Pro 6000 fits this easily
  learning_rate: 0.0005    # slightly higher to match bigger batch
  num_epochs: 30           # AMP bf16 + GPU mel — 30 ep is plenty (loss drops fast)
  num_workers: 24          # 32-core box — keep GPU fed
  amp: true                # bf16 autocast on Blackwell tensor cores
  gradient_clip: 5.0
  checkpoint_dir: "./outputs/checkpoints/cnn_lstm"

whisper:
  model_size: "medium"    # tiny | base | small | medium | large-v2 | large-v3
  language: "ar"
  task: "transcribe"
  device: "auto"
  beam_size: 5

wav2vec:
  model_name: "facebook/wav2vec2-large-xlsr-53-arabic"
  device: "auto"
  batch_size: 8
  num_epochs: 10
  learning_rate: 1e-4
  warmup_ratio: 0.1
  checkpoint_dir: "./outputs/checkpoints/wav2vec"

seamless_m4t:
  model_name: "facebook/seamless-m4t-v2-large"  # use hf-seamless-m4t-medium if VRAM is tight
  language: "arb"     # ISO 639-3 — Standard Arabic
  device: "auto"

advanced:
  # 4 optional advanced tasks from the project requirements.
  speaker_id:
    enabled: true
    model_name: "speechbrain/spkrec-ecapa-voxceleb"
    similarity_threshold: 0.7
  emotion:
    enabled: true
    model_name: "harshit345/xlsr-wav2vec-speech-emotion-recognition"
    classes: ["angry", "calm", "disgust", "fear", "happy", "neutral", "sad", "surprise"]
  keyword_spotting:
    enabled: true
    keywords: ["طوارئ", "موعد نهائي", "امتحان", "emergency", "deadline", "exam"]
  summarization:
    enabled: true
    model_name: "csebuetnlp/mT5_multilingual_XLSum"
    max_length: 80
    min_length: 20
  search:
    enabled: true
    embedding_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    top_k: 5

evaluation:
  metrics: ["wer", "cer"]
  results_dir: "./outputs/results"
  log_dir: "./outputs/logs"
  num_test_samples: 300

demo:
  server_port: 7860
  share: false
