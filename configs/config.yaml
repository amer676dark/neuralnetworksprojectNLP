project:
  name: "Arabic ASR System"
  description: "Deep Learning Based Arabic Audio Understanding and Retrieval System"
  language: "ar"

data:
  # Source: "common_voice" | "masc" | "arabic_speech_corpus" | "ejust" | "combined"
  source: "common_voice"
  # For local datasets (arabic_speech_corpus, ejust) — set the folder path
  data_dir: null
  # HuggingFace token — required for Common Voice (or set HF_TOKEN env var)
  hf_token: null
  # Which sources to mix if source = "combined"
  combine_sources: ["common_voice", "masc"]

  sample_rate: 16000
  max_duration: 10       # seconds — clips longer than this are skipped
  max_train_samples: 5000
  max_eval_samples: 500
  processed_dir: "./data/processed"

audio:
  sample_rate: 16000
  n_mels: 80
  n_fft: 512
  hop_length: 160
  win_length: 400
  f_min: 0
  f_max: 8000
  max_audio_length: 10

cnn_lstm:
  # CNN
  cnn_channels: [32, 64, 128]
  cnn_kernel_size: 3
  cnn_dropout: 0.15
  # LSTM
  lstm_hidden_size: 512
  lstm_num_layers: 3
  lstm_dropout: 0.3
  # Attention
  attention_heads: 8
  # SpecAugment
  spec_augment: true
  # Training
  batch_size: 16
  learning_rate: 0.0003
  num_epochs: 50
  gradient_clip: 5.0
  checkpoint_dir: "./outputs/checkpoints/cnn_lstm"

whisper:
  model_size: "medium"    # tiny | base | small | medium | large-v2 | large-v3
  language: "ar"
  task: "transcribe"
  device: "auto"
  beam_size: 5

wav2vec:
  model_name: "facebook/wav2vec2-large-xlsr-53-arabic"
  device: "auto"
  batch_size: 8
  num_epochs: 10
  learning_rate: 1e-4
  warmup_ratio: 0.1
  checkpoint_dir: "./outputs/checkpoints/wav2vec"

evaluation:
  metrics: ["wer", "cer"]
  results_dir: "./outputs/results"
  log_dir: "./outputs/logs"
  num_test_samples: 200

demo:
  server_port: 7860
  share: false
